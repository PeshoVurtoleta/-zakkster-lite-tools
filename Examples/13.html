<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe 13 — Theme Playground</title>
    <style>
        /* Base styles - these will be overridden by the injected theme CSS */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: 'Outfit', 'Fira Code', monospace;
            transition: background 0.3s, color 0.3s;
            /* We use fallback variables here so it looks okay before the theme boots */
            background: var(--app-bg, #050508);
            color: var(--app-text, #c8c8e0);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        #ui {
            overflow: auto;
            background: var(--app-surface, rgba(12, 12, 20, 0.9));
            padding: 30px;
            border-radius: 12px;
            border: 1px solid var(--app-border, #1a1a2e);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            max-width: 600px;
            width: 90%;
        }

        .header {
            color: var(--app-primary, #8b5cf6);
            font-weight: bold;
            font-size: 24px;
            margin-bottom: 10px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        button {
            padding: 10px 20px;
            font-family: inherit;
            font-weight: bold;
            cursor: pointer;
            border-radius: 6px;
            border: none;
            transition: 0.2s;
            background: var(--app-primary, #8b5cf6);
            color: var(--app-on-primary, #fff);
        }

        button:hover {
            filter: brightness(1.2);
            transform: translateY(-2px);
        }

        button.outline {
            background: transparent;
            border: 1px solid var(--app-primary, #8b5cf6);
            color: var(--app-primary, #8b5cf6);
        }

        /* The CSS Code Dump */
        pre {
            background: #000;
            color: #4facfe;
            padding: 15px;
            border-radius: 6px;
            overflow-x: auto;
            font-size: 12px;
            margin: 0;
            border: 1px solid #333;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="header">Theme Playground</div>
    <div style="opacity: 0.8; margin-bottom: 20px;">Dynamically injecting OKLCH CSS variables into the &lt;head&gt;.
    </div>

    <div class="controls">
        <button id="btn-mode">Toggle Light/Dark</button>
        <button id="btn-brand-1" class="outline">Brand: Purple</button>
        <button id="btn-brand-2" class="outline">Brand: Orange</button>
    </div>

    <div style="font-weight: bold; margin-bottom: 10px; font-size: 12px;">INJECTED CSS:</div>
    <pre id="code-output">Loading...</pre>
</div>

<script type="module">
    import {Recipes} from 'https://cdn.jsdelivr.net/npm/@zakkster/lite-tools@2.0.19/+esm';

    const output = document.getElementById('code-output');

    // 1. MOUNT THE RECIPE
    const theme = Recipes.themePlayground({
        initialBrand: {l: 0.6, c: 0.2, h: 260}, // Starting Purple
        mode: 'dark', // Force dark mode to start to match your gallery
        prefix: 'app',
        onThemeChange: (palette, css) => {
            // Dump the raw CSS string onto the screen so you can see the variables
            output.textContent = css;
        }
    });

    // 2. WIRING THE BUTTONS
    document.getElementById('btn-mode').onclick = () => theme.toggleMode();

    document.getElementById('btn-brand-1').onclick = () => {
        theme.setBrand({l: 0.6, c: 0.2, h: 260}); // Purple
    };

    document.getElementById('btn-brand-2').onclick = () => {
        theme.setBrand({l: 0.65, c: 0.25, h: 30}); // Orange
    };
</script>
</body>
</html>
