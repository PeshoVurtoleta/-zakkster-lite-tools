<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe 08 — Noise Terrain Heatmap</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Fira Code', monospace;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(12, 12, 20, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1a1a2e;
        }

        .title {
            color: #4facfe;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 8px 12px;
            background: #1a1a2e;
            color: white;
            border: 1px solid #4facfe;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: 0.2s;
        }

        button:hover {
            background: #4facfe;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="title">Recipe 08: Noise Terrain</div>
    <div style="font-size: 12px; color: #c8c8e0; opacity: 0.7;">Zero-GC FBM Noise Generation</div>

    <div class="controls">
        <button id="btn-reseed">Random Reseed</button>
        <button id="btn-specific">Load Seed 12345</button>
    </div>
</div>

<canvas id="stage"></canvas>

<script type="module">
    import {Recipes} from 'https://cdn.jsdelivr.net/npm/@zakkster/lite-tools@2.0.19/+esm';

    const canvas = document.getElementById('stage');

    // 1. PHYSICAL SIZING (Pixel Art Style)
    // We intentionally don't use DPR here, letting the cellSize dictate the chunky resolution
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    // 2. MOUNT THE RECIPE (Self-Animated)
    // We pass the exact custom gradient from your README!
    const map = Recipes.noiseHeatmap(canvas, {
        seed: 42,
        cellSize: 6,
        animate: true, // This triggers the internal requestAnimationFrame!
        gradientColors: [
            {l: 0.15, c: 0.08, h: 260},  // deep ocean
            {l: 0.55, c: 0.2, h: 130},   // lowland
            {l: 0.95, c: 0.02, h: 0},    // snow peak
        ]
    });

    // 3. UI WIRING
    document.getElementById('btn-reseed').onclick = () => map.reseed(); // Random new terrain
    document.getElementById('btn-specific').onclick = () => map.reseed(12345); // Deterministic terrain
</script>
</body>
</html>
