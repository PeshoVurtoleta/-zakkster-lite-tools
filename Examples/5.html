<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe 05 — Particle Cursor</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050508;
            overflow: hidden;
            font-family: 'Fira Code', monospace;
        }

        /* The canvas must be able to receive mouse events for e.offsetX to work! */
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(12, 12, 20, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1a1a2e;
            pointer-events: none; /* Let the mouse click through the UI to the canvas */
        }

        .title {
            color: #f6ca5c;
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="title">Recipe 05: Particle Cursor</div>
    <div style="font-size: 12px; color: #c8c8e0; opacity: 0.7;">Move your mouse around the screen!</div>
</div>

<canvas id="stage"></canvas>

<script type="module">
    import {Recipes} from 'https://cdn.jsdelivr.net/npm/@zakkster/lite-tools@2.0.19/+esm';

    const canvas = document.getElementById('stage');

    // 1. PHYSICAL SIZING (1:1 CSS Mapping)
    // We intentionally do not use DPR here so the recipe's internal `e.offsetX` math is perfect.
    function resize() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resize);
    resize();

    // 2. MOUNT THE RECIPE
    // This automatically creates its own Ticker, Emitter, and mouse listeners.
    const cursor = Recipes.particleCursor(canvas, {
        maxParticles: 1000,
        trailColor: {l: 0.9, c: 0.15, h: 50}, // Bright yellow/gold
        fadeColor: {l: 0.5, c: 0.2, h: 30},   // Fades to deep orange
        spawnRate: 4
    });
</script>
</body>
</html>
