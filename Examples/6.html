<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe 06 — Procedural Starfield</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Fira Code', monospace;
        }

        /* CRITICAL CSS ISOLATION:
           This container prevents the internal `Viewport.js` autoResize loop from stretching indefinitely.
        */
        #container {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            contain: strict;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(12, 12, 20, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1a1a2e;
        }

        .title {
            color: #4facfe;
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="title">Recipe 06: Starfield</div>
    <div style="font-size: 12px; color: #c8c8e0; opacity: 0.7;">Zero-GC Sine Wave Twinkling</div>
</div>

<div id="container">
    <canvas id="stage"></canvas>
</div>

<script type="module">
    import {Recipes} from 'https://cdn.jsdelivr.net/npm/@zakkster/lite-tools@2.0.19/+esm';

    const canvas = document.getElementById('stage');

    // MOUNT THE RECIPE
    // Viewport handles the resizing automatically. Ticker handles the render loop.
    const space = Recipes.starfield(canvas, {
        seed: 99,
        starCount: 600,
        twinkleSpeed: 2
    });
</script>
</body>
</html>
