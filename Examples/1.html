<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe 01 — Branded Generative Background</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            font-family: 'Outfit', sans-serif;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(12, 12, 20, 0.8);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            color: white;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
        }

        .title {
            font-weight: bold;
            font-size: 1.2rem;
            margin-bottom: 5px;
        }

        .subtitle {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-bottom: 15px;
        }

        .controls {
            display: flex;
            gap: 10px;
        }

        button {
            padding: 8px 16px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 6px;
            cursor: pointer;
            font-family: inherit;
            transition: 0.2s;
        }

        button:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        button.active {
            background: #8b5cf6;
            border-color: #8b5cf6;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="title">Flow Field Art</div>
    <div class="subtitle">lite-gen + lite-theme-gen</div>

    <div class="controls">
        <button id="btn-anim" class="active">Animated</button>
        <button id="btn-static">Static Poster</button>
    </div>
</div>

<canvas id="stage"></canvas>

<script type="module">
    import {Recipes} from 'https://cdn.jsdelivr.net/npm/@zakkster/lite-tools@2.0.19/+esm';

    const canvas = document.getElementById('stage');
    // Using physical screen pixels for crisp lines
    canvas.width = window.innerWidth * (window.devicePixelRatio || 1);
    canvas.height = window.innerHeight * (window.devicePixelRatio || 1);

    let activeBg = null;

    function mount(animate) {
        // Clean up the previous engine if it exists
        if (activeBg) activeBg.destroy();

        // Mount the new recipe
        activeBg = Recipes.brandedBackground(canvas, {l: 0.6, c: 0.2, h: 250}, {
            seed: 12345,
            animate: animate
        });
    }

    // Initial mount
    mount(true);

    // UI Wiring
    const btnAnim = document.getElementById('btn-anim');
    const btnStatic = document.getElementById('btn-static');

    btnAnim.onclick = () => {
        mount(true);
        btnAnim.classList.add('active');
        btnStatic.classList.remove('active');
    };
    btnStatic.onclick = () => {
        mount(false);
        btnStatic.classList.add('active');
        btnAnim.classList.remove('active');
    };

</script>
</body>
</html>
