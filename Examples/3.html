<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe 03 — AAA Black Hole</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050508;
            overflow: hidden;
            font-family: 'Fira Code', monospace;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
            cursor: crosshair;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(12, 12, 20, 0.9);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #1a1a2e;
            pointer-events: none;
        }

        .title {
            color: #8b5cf6;
            font-weight: bold;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div id="ui">
    <div class="title">Recipe 03: AAA Black Hole</div>
    <div style="font-size: 12px; color: #c8c8e0; opacity: 0.7;">Steer with mouse. Click to trigger supernova.</div>
</div>

<canvas id="stage"></canvas>

<script type="module">
    // We import Presets so we can feed the accretion disk manually!
    import {Recipes, Presets} from 'https://cdn.jsdelivr.net/npm/@zakkster/lite-tools@2.0.19/+esm';

    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // Track the hole's position for drawing the Event Horizon
    let bhX = canvas.width / 2;
    let bhY = canvas.height / 2;

    // 1. MOUNT THE RECIPE
    const hole = Recipes.blackHole(ctx, bhX, bhY, {
        maxParticles: 15000,
        seed: 9999,
        wellStrength: 5000 * dpr,
        vortexStrength: 3000 * dpr
    });

    // We register a tiny spark preset to act as space dust for the accretion disk
    // We register a tiny spark preset to act as space dust for the accretion disk
    const spaceDust = hole.fx.register({
        ...Presets.sparks,
        count: 2,
        speedMin: 10, speedMax: 50,
        lifeMin: 1.0, lifeMax: 2.0,
        sizeMin: 1, sizeMax: 2,
        // --- THE FIX: Satisfy the FXSystem strict contract ---
        colorFn: (life, speed) => {
            // Returns a bright, hot-white/blue dust particle that fades out as it dies
            return `rgba(200, 230, 255, ${life})`;
        }
    });

    // 2. INTERACTION
    canvas.addEventListener('mousemove', (e) => {
        bhX = e.clientX * dpr;
        bhY = e.clientY * dpr;
        hole.moveTo(bhX, bhY);
    });

    canvas.addEventListener('mousedown', (e) => {
        // Trigger a Supernova Ring safely OUTSIDE the black event horizon
        const numExplosions = 6;
        for (let i = 0; i < numExplosions; i++) {
            const angle = (i / numExplosions) * Math.PI * 2;
            const radius = 120 * dpr; // Spawn them 120px away from the center

            hole.explode(
                bhX + Math.cos(angle) * radius,
                bhY + Math.sin(angle) * radius
            );
        }
    });

    // 3. HEARTBEAT LOOP
    function loop() {
        // Draw the motion blur trails
        ctx.fillStyle = 'rgba(5, 5, 8, 0.15)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);

        // --- PRO LEVEL ADDITION: Draw the Event Horizon ---
        ctx.save();
        const radius = 50 * dpr;
        const g = ctx.createRadialGradient(bhX, bhY, 0, bhX, bhY, radius * 1.5);
        g.addColorStop(0, 'rgba(0,0,0,1)');         // Pitch black center
        g.addColorStop(0.6, 'rgba(0,0,0,1)');       // Event horizon edge
        g.addColorStop(0.8, 'rgba(139,92,246,0.3)'); // Purple gravitational lensing glow
        g.addColorStop(1, 'rgba(0,0,0,0)');         // Fade to space

        ctx.fillStyle = g;
        ctx.beginPath();
        ctx.arc(bhX, bhY, radius * 1.5, 0, Math.PI * 2);
        ctx.fill();
        ctx.restore();

        // --- PRO LEVEL ADDITION: Feed the Accretion Disk ---
        // Spawn space dust in a wide circle around the hole so the Vortex can suck it in!
        const angle = Math.random() * Math.PI * 2;
        const spawnRadius = 300 * dpr; // Spawn them 300px away
        hole.fx.spawn(
            bhX + Math.cos(angle) * spawnRadius,
            bhY + Math.sin(angle) * spawnRadius,
            spaceDust
        );

        requestAnimationFrame(loop);
    }

    requestAnimationFrame(loop);

    // Initial explosion
    setTimeout(() => hole.explode(bhX, bhY), 300);

</script>
</body>
</html>
