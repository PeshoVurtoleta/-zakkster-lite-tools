<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe 10 — Cinematic Snowfall</title>
    <style>
        /* The CSS background acts as our sky, since the recipe clears the canvas to transparent */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to bottom, #0a0f18, #1a2035);
            overflow: hidden;
            font-family: 'Fira Code', monospace;
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }

        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            z-index: 10;
            background: rgba(12, 12, 20, 0.8);
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #4facfe;
        }

        .controls {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        button {
            padding: 8px 12px;
            background: rgba(79, 172, 254, 0.1);
            color: #4facfe;
            border: 1px solid #4facfe;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
            font-size: 12px;
            transition: 0.2s;
        }

        button:hover {
            background: #4facfe;
            color: white;
        }
    </style>
</head>
<body>

<div id="ui">
    <div style="color: white; font-weight: bold; margin-bottom: 5px;">Recipe 10: Snowfall</div>
    <div style="font-size: 12px; color: #4facfe;">lite-snow + lite-ticker</div>

    <div class="controls">
        <button id="wind-left">🌬️ Blow Left</button>
        <button id="wind-calm">❄️ Calm</button>
        <button id="wind-right">🌬️ Blow Right</button>
    </div>
</div>

<canvas id="stage"></canvas>

<script type="module">
    import {Recipes} from 'https://cdn.jsdelivr.net/npm/@zakkster/lite-tools@2.0.19/+esm';

    const canvas = document.getElementById('stage');
    const ctx = canvas.getContext('2d');
    const dpr = window.devicePixelRatio || 1;

    canvas.width = window.innerWidth * dpr;
    canvas.height = window.innerHeight * dpr;

    // 1. MOUNT THE RECIPE (Self-running)
    const snow = Recipes.snowfall(ctx, canvas.width, canvas.height, {
        windStrength: 30,
        turbulenceStrength: 60,
        maxParticles: 5000
    });

    // 2. UI WIRING
    document.getElementById('wind-left').onclick = () => snow.setWind(-150);
    document.getElementById('wind-calm').onclick = () => snow.setWind(10); // slight natural drift
    document.getElementById('wind-right').onclick = () => snow.setWind(150);
</script>
</body>
</html>
