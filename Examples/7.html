<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Recipe 07 — Spring Menu</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #050508;
            color: #c8c8e0;
            font-family: 'Fira Code', monospace;
            overflow: hidden;
        }

        /* --- THE MAIN CONTENT AREA --- */
        .content {
            padding: 80px 40px;
            text-align: center;
        }

        .content h1 {
            color: #8b5cf6;
        }

        /* --- THE TOGGLE BUTTON --- */
        #hamburger {
            position: fixed;
            top: 20px;
            left: 20px;
            z-index: 100;
            width: 44px;
            height: 44px;
            background: #1a1a2e;
            border: 2px solid #8b5cf6;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            font-size: 20px;
            color: white;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
            /* Recipe handles the rotation via JS! */
        }

        /* --- THE NAVIGATION MENU --- */
        #mobile-nav {
            position: fixed;
            top: 0;
            left: 0;
            z-index: 90;
            width: 300px;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            /* We start it off-screen so there's no flicker before JS loads */
            transform: translate3d(-100%, 0, 0);
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.5);
        }

        .nav-links {
            list-style: none;
            padding: 0;
            margin: 0;
            text-align: center;
        }

        .nav-links li {
            margin: 20px 0;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            font-size: 24px;
            font-weight: bold;
            transition: color 0.2s;
        }

        .nav-links a:hover {
            color: #8b5cf6;
        }
    </style>
</head>
<body>

<div id="hamburger">☰</div>

<nav id="mobile-nav">
    <ul class="nav-links">
        <li><a href="#">Home</a></li>
        <li><a href="#">Gallery</a></li>
        <li><a href="#">Engines</a></li>
        <li><a href="#">Contact</a></li>
    </ul>
</nav>

<div class="content">
    <h1>Recipe 07: Spring Menu</h1>
    <p>Click the ☰ icon to see the FSM + Spring in action.</p>
</div>

<script type="module">
    import {Recipes} from 'https://cdn.jsdelivr.net/npm/@zakkster/lite-tools@2.0.19/+esm';

    // MOUNT THE RECIPE
    // The recipe automatically wires the click listener to '#hamburger'
    const menu = Recipes.springMenu('#mobile-nav', '#hamburger', {
        stiffness: 200,
        damping: 22,
        openColor: {l: 0.2, c: 0.1, h: 280} // Dark purple background when open
    });

</script>
</body>
</html>
